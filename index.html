<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In \ Sign Out</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=Poopins" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1 class="title">Sign up</h1>
            <div class="underline"></div>
            <form >
                <div class="input-group">

                    <div class="input-field nameField">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Name">
                    </div><!--end input field-->

                    <div class="input-field ">
                        <i class="fa-solid fa-at"></i>
                        <input type="email" placeholder="email">
                    </div><!--end input field-->

                    <div class="input-field">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" placeholder="password">
                    </div><!--end input field-->
                   <p>  <span class="text"> Password Suggestions </span><a href="#">  Click Here  </a></p>


                </div><!--end input group-->
                <div class="btn-field">
                    <button type="button" class="signUpBtn">Sign Up</button>
                    <button type="button" class="disable signInBtn">Sign in</button>
                </div>
                <!--end btn-field-->
            </form>

        </div><!--end Form box-->


    </div><!--End Container-->
    
<script src="script.js"></script>
</body>
</html>
